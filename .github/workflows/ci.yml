name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate-examples:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Checkout rhylthyme-spec
      uses: actions/checkout@v4
      with:
        repository: rhylthyme/rhylthyme-spec
        path: rhylthyme-spec

    - name: Checkout rhylthyme-cli-runner
      uses: actions/checkout@v4
      with:
        repository: rhylthyme/rhylthyme-cli-runner
        path: rhylthyme-cli-runner

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install rhylthyme-spec from local checkout
        pip install -e ./rhylthyme-spec
        # Install rhylthyme-cli-runner from local checkout
        pip install -e "./rhylthyme-cli-runner[dev]"
        # Install test dependencies for this repo
        pip install -e ".[dev]"

    - name: Run unit tests
      run: |
        pytest tests -v -m "unit"

    - name: Run integration tests
      run: |
        pytest tests -v -m "integration"

    - name: Run validation tests
      run: |
        pytest tests -v -m "validation"

    - name: Run all example validation
      run: |
        pytest tests/test_validate_examples.py -v

    - name: Generate coverage report
      if: matrix.python-version == '3.10'
      run: |
        pytest tests -v --cov=. --cov-report=xml

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.10'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: validation-tests
        name: codecov-examples
        fail_ci_if_error: false

  validate-json-yaml:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install PyYAML
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml

    - name: Validate JSON files
      run: |
        python -c "
        import json
        import sys
        from pathlib import Path

        failed = []
        programs_dir = Path('programs')
        for f in programs_dir.glob('*.json'):
            try:
                with open(f) as fp:
                    json.load(fp)
                print(f'✅ {f.name}')
            except json.JSONDecodeError as e:
                print(f'❌ {f.name}: {e}')
                failed.append(f.name)

        environments_dir = Path('environments')
        for f in environments_dir.glob('*.json'):
            try:
                with open(f) as fp:
                    json.load(fp)
                print(f'✅ {f.name}')
            except json.JSONDecodeError as e:
                print(f'❌ {f.name}: {e}')
                failed.append(f.name)

        if failed:
            print(f'\n❌ Failed to parse {len(failed)} files')
            sys.exit(1)
        else:
            print(f'\n✅ All JSON files are valid')
        "

    - name: Validate YAML files
      run: |
        python -c "
        import yaml
        import sys
        from pathlib import Path

        failed = []
        warnings = []
        programs_dir = Path('programs')
        for f in list(programs_dir.glob('*.yaml')) + list(programs_dir.glob('*.yml')):
            try:
                with open(f) as fp:
                    yaml.safe_load(fp)
                print(f'✅ {f.name}')
            except yaml.YAMLError as e:
                print(f'⚠️  {f.name}: {e}')
                warnings.append(f.name)

        if failed:
            print(f'\n❌ Failed to parse {len(failed)} files')
            sys.exit(1)
        elif warnings:
            print(f'\n⚠️  {len(warnings)} YAML files had warnings (this is acceptable)')
        else:
            print(f'\n✅ All YAML files are valid')
        "

  schema-validation:
    runs-on: ubuntu-latest
    needs: validate-json-yaml

    steps:
    - uses: actions/checkout@v4

    - name: Checkout rhylthyme-spec
      uses: actions/checkout@v4
      with:
        repository: rhylthyme/rhylthyme-spec
        path: rhylthyme-spec

    - name: Checkout rhylthyme-cli-runner
      uses: actions/checkout@v4
      with:
        repository: rhylthyme/rhylthyme-cli-runner
        path: rhylthyme-cli-runner

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ./rhylthyme-spec
        pip install -e ./rhylthyme-cli-runner

    - name: Validate all examples against schema
      run: |
        cd rhylthyme-cli-runner
        python -m pytest tests/test_validate_examples_ci.py -v
