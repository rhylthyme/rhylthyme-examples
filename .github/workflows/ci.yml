name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout rhylthyme-examples
      uses: actions/checkout@v4
      with:
        path: rhylthyme-examples

    - name: Checkout rhylthyme-spec
      uses: actions/checkout@v4
      with:
        repository: rhylthyme/rhylthyme-spec
        path: rhylthyme-spec

    - name: Checkout rhylthyme-cli-runner
      uses: actions/checkout@v4
      with:
        repository: rhylthyme/rhylthyme-cli-runner
        path: rhylthyme-cli-runner

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ./rhylthyme-spec
        pip install -e ./rhylthyme-cli-runner
        pip install pytest pyyaml setuptools

    - name: Run tests
      run: |
        cd rhylthyme-examples
        pytest tests/ -v
