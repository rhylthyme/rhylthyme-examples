actors: 3
description: A schedule demonstrating staggered batch execution
name: Staggered Batch Example
programId: staggered-batch-example
resourceConstraints:
- description: Only 2 chefs available to prepare orders
  maxConcurrent: 2
  task: chef
- description: 3 servers available to deliver orders
  maxConcurrent: 3
  task: server
startTrigger:
  type: manual
tracks:
- batch_size: 5
  name: Staggered Food Orders
  stagger_seconds: 60
  steps:
  - description: New order comes in
    duration:
      seconds: 30
      type: fixed
    name: Order Received
    startTrigger:
      type: programStart
    stepId: order-received
    task: unknown-task
  - description: Chef prepares the order
    duration:
      defaultSeconds: 180
      maxSeconds: 300
      minSeconds: 120
      triggerName: order-ready
      type: variable
    name: Prepare Order
    startTrigger:
      stepId: order-received
      type: afterStep
    stepId: prepare-order
    task: chef
  - description: Server delivers the order to the table
    duration:
      seconds: 60
      type: fixed
    name: Serve Order
    startTrigger:
      stepId: prepare-order
      type: afterStep
    stepId: serve-order
    task: server
  trackId: staggered-orders
- batch_size: 5
  name: Non-Staggered Food Orders
  steps:
  - description: Multiple orders come in at once
    duration:
      seconds: 30
      type: fixed
    name: Bulk Order Received
    startTrigger:
      offsetSeconds: 300
      type: programStartOffset
    stepId: bulk-order-received
    task: unknown-task
  - description: Chef prepares multiple orders at once
    duration:
      defaultSeconds: 180
      maxSeconds: 300
      minSeconds: 120
      triggerName: bulk-order-ready
      type: variable
    name: Prepare Bulk Order
    startTrigger:
      stepId: bulk-order-received
      type: afterStep
    stepId: prepare-bulk-order
    task: chef
  - description: Server delivers multiple orders
    duration:
      seconds: 60
      type: fixed
    name: Serve Bulk Order
    startTrigger:
      stepId: prepare-bulk-order
      type: afterStep
    stepId: serve-bulk-order
    task: server
  trackId: non-staggered-orders
