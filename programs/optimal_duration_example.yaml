description: 'This example demonstrates how to use variable durations with optimal
  values

  for planning. The program planner will use the optimal duration values to

  create a more efficient schedule.

  '
name: Optimal Duration Example
programId: optimal_duration_example
resourceConstraints:
- description: Maximum number of CPU-intensive tasks that can run concurrently
  maxConcurrent: 2
  task: cpu
- description: Maximum number of memory-intensive tasks that can run concurrently
  maxConcurrent: 2
  task: memory
- description: Maximum number of network-intensive tasks that can run concurrently
  maxConcurrent: 1
  task: network
- description: Maximum number of disk I/O-intensive tasks that can run concurrently
  maxConcurrent: 1
  task: disk_io
tracks:
- name: Data Processing
  steps:
  - description: Collect data from various sources
    duration:
      defaultSeconds: 120
      maxSeconds: 180
      minSeconds: 60
      optimalSeconds: 90
      triggerName: data-collection-complete
      type: variable
    name: Data Collection
    priority: 10
    startTrigger:
      type: programStart
    stepId: step1_1
    task: network
    tasks:
    - network
  - description: Validate collected data
    duration:
      defaultSeconds: 60
      maxSeconds: 120
      minSeconds: 30
      optimalSeconds: 45
      triggerName: validation-complete
      type: variable
    name: Data Validation
    priority: 20
    startTrigger:
      stepId: step1_1
      type: afterStep
    stepId: step1_2
    task: cpu
    tasks:
    - cpu
  - description: Process validated data
    duration:
      defaultSeconds: 240
      maxSeconds: 300
      minSeconds: 120
      optimalSeconds: 180
      triggerName: processing-complete
      type: variable
    name: Data Processing
    priority: 30
    startTrigger:
      stepId: step1_2
      type: afterStep
    stepId: step1_3
    task: cpu
    tasks:
    - cpu
    - memory
  trackId: track1
- name: Reporting
  steps:
  - description: Prepare report templates
    duration:
      defaultSeconds: 60
      maxSeconds: 90
      minSeconds: 45
      optimalSeconds: 60
      triggerName: templates-ready
      type: variable
    name: Report Template Preparation
    priority: 40
    startTrigger:
      type: programStart
    stepId: step2_1
    task: cpu
    tasks:
    - cpu
  - description: Create visualizations for the report
    duration:
      defaultSeconds: 180
      maxSeconds: 240
      minSeconds: 90
      optimalSeconds: 120
      triggerName: visualizations-ready
      type: variable
    name: Data Visualization
    priority: 50
    startTrigger:
      stepId: step2_1
      type: afterStep
    stepId: step2_2
    task: cpu
    tasks:
    - cpu
    - memory
  - description: Generate final report
    duration:
      defaultSeconds: 120
      maxSeconds: 180
      minSeconds: 60
      optimalSeconds: 90
      triggerName: report-complete
      type: variable
    name: Report Generation
    priority: 60
    startTrigger:
      stepId: step2_2
      type: afterStep
    stepId: step2_3
    task: cpu
    tasks:
    - cpu
    - disk_io
  trackId: track2
- name: Notification
  steps:
  - description: Prepare email notifications
    duration:
      defaultSeconds: 60
      maxSeconds: 90
      minSeconds: 30
      optimalSeconds: 45
      triggerName: emails-ready
      type: variable
    name: Email Preparation
    priority: 70
    startTrigger:
      type: programStart
    stepId: step3_1
    task: cpu
    tasks:
    - cpu
  - description: Send email notifications
    duration:
      defaultSeconds: 60
      maxSeconds: 120
      minSeconds: 15
      optimalSeconds: 30
      triggerName: notifications-sent
      type: variable
    name: Send Notifications
    priority: 80
    startTrigger:
      stepId: step3_1
      type: afterStep
    stepId: step3_2
    task: network
    tasks:
    - network
  trackId: track3
