description: 'This example demonstrates how the program planner can optimize a schedule

  with resource contention by staggering track and step starts.


  It also shows how to use the priority flag to prioritize certain steps

  when there is contention for a bottleneck resource. Lower priority numbers

  are given higher precedence.

  '
name: Resource Contention Example
programId: resource_contention_example
resourceConstraints:
- description: Maximum number of CPU-intensive tasks
  maxConcurrent: 2
  task: cpu
- description: Maximum number of database connections
  maxConcurrent: 1
  task: database
- description: Maximum number of network-intensive tasks
  maxConcurrent: 2
  task: network
- description: Maximum number of disk I/O operations
  maxConcurrent: 2
  task: disk_io
tracks:
- name: Track 1
  steps:
  - description: Set up the database for testing
    duration:
      seconds: 10
      type: fixed
    name: Initialize Database
    priority: 10
    startTrigger:
      type: programStart
    stepId: step1_1
    task: database
    tasks:
    - database
  - description: Load test data into the database
    duration:
      seconds: 15
      type: fixed
    name: Load Test Data
    priority: 30
    startTrigger:
      stepId: step1_1
      type: afterStep
    stepId: step1_2
    task: database
    tasks:
    - database
    - disk_io
  - description: Execute database tests
    duration:
      seconds: 20
      type: fixed
    name: Run Database Tests
    priority: 20
    startTrigger:
      stepId: step1_2
      type: afterStep
    stepId: step1_3
    task: database
    tasks:
    - database
    - cpu
  trackId: track1
- name: Track 2
  steps:
  - description: Start the API server
    duration:
      seconds: 8
      type: fixed
    name: Initialize API Server
    priority: 50
    startTrigger:
      type: programStart
    stepId: step2_1
    task: network
    tasks:
    - network
  - description: Prepare test data for API tests
    duration:
      seconds: 12
      type: fixed
    name: Load API Test Data
    priority: 60
    startTrigger:
      stepId: step2_1
      type: afterStep
    stepId: step2_2
    task: database
    tasks:
    - database
    - disk_io
  - description: Execute API tests
    duration:
      seconds: 25
      type: fixed
    name: Run API Tests
    priority: 40
    startTrigger:
      stepId: step2_2
      type: afterStep
    stepId: step2_3
    task: network
    tasks:
    - network
    - cpu
  trackId: track2
- name: Track 3
  steps:
  - description: Set up the frontend environment
    duration:
      seconds: 5
      type: fixed
    name: Initialize Frontend
    priority: 70
    startTrigger:
      type: programStart
    stepId: step3_1
    task: network
    tasks:
    - network
  - description: Load assets for frontend testing
    duration:
      seconds: 10
      type: fixed
    name: Load Frontend Assets
    priority: 80
    startTrigger:
      stepId: step3_1
      type: afterStep
    stepId: step3_2
    task: disk_io
    tasks:
    - disk_io
  - description: Execute frontend tests
    duration:
      seconds: 30
      type: fixed
    name: Run Frontend Tests
    priority: 90
    startTrigger:
      stepId: step3_2
      type: afterStep
    stepId: step3_3
    task: cpu
    tasks:
    - cpu
    - network
  trackId: track3
- name: Track 4
  steps:
  - description: Set up the integration test environment
    duration:
      seconds: 12
      type: fixed
    name: Initialize Integration Environment
    priority: 15
    startTrigger:
      type: programStart
    stepId: step4_1
    task: database
    tasks:
    - database
    - network
  - description: Prepare data for integration tests
    duration:
      seconds: 18
      type: fixed
    name: Prepare Integration Tests
    priority: 25
    startTrigger:
      stepId: step4_1
      type: afterStep
    stepId: step4_2
    task: disk_io
    tasks:
    - disk_io
    - database
  - description: Execute integration tests
    duration:
      seconds: 35
      type: fixed
    name: Run Integration Tests
    priority: 35
    startTrigger:
      stepId: step4_2
      type: afterStep
    stepId: step4_3
    task: cpu
    tasks:
    - cpu
    - database
    - network
  trackId: track4
