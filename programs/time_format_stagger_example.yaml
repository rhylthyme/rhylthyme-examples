actors: 3
description: A schedule demonstrating staggered batch execution with flexible time
  formats
name: Time Format Stagger Example
programId: time-format-stagger-example
resourceConstraints:
- description: Only 2 chefs available to prepare orders
  maxConcurrent: 2
  task: chef
startTrigger:
  type: manual
tracks:
- batch_size: 3
  name: Orders with Minute Stagger
  stagger: 2m
  steps:
  - description: New order comes in
    duration:
      seconds: 30
      type: fixed
    name: Order Received
    startTrigger:
      type: programStart
    stepId: order-received
    task: unknown-task
  - description: Chef prepares the order
    duration:
      defaultSeconds: 180
      maxSeconds: 300
      minSeconds: 120
      triggerName: order-ready
      type: variable
    name: Prepare Order
    startTrigger:
      stepId: order-received
      type: afterStep
    stepId: prepare-order
    task: chef
  trackId: minutes-stagger
- batch_size: 3
  name: Orders with Complex Stagger
  stagger: 1h30m
  steps:
  - description: Special order comes in
    duration:
      seconds: 30
      type: fixed
    name: Special Order
    startTrigger:
      type: programStart
    stepId: special-order
    task: unknown-task
  - description: Chef prepares the special order
    duration:
      defaultSeconds: 450
      maxSeconds: 600
      minSeconds: 300
      triggerName: special-ready
      type: variable
    name: Prepare Special Order
    startTrigger:
      stepId: special-order
      type: afterStep
    stepId: prepare-special
    task: chef
  trackId: complex-stagger
- batch_size: 5
  name: Orders with Seconds Stagger
  stagger: 30s
  steps:
  - description: Quick order comes in
    duration:
      seconds: 15
      type: fixed
    name: Quick Order
    startTrigger:
      type: programStart
    stepId: quick-order
    task: unknown-task
  - description: Chef prepares the quick order
    duration:
      seconds: 60
      type: fixed
    name: Prepare Quick Order
    startTrigger:
      stepId: quick-order
      type: afterStep
    stepId: prepare-quick
    task: chef
  trackId: seconds-stagger
