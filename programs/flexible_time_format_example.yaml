actors: 3
description: A schedule demonstrating flexible time format for all time-related fields
name: Flexible Time Format Example
programId: flexible-time-format-example
resourceConstraints:
- description: Only 2 complex tasks can run simultaneously
  maxConcurrent: 2
  task: complex-task
startTrigger:
  type: manual
tracks:
- name: Fixed Duration Examples
  steps:
  - description: Using seconds notation
    duration:
      seconds: 30s
      type: fixed
    name: Fixed Duration (Seconds)
    startTrigger:
      type: programStart
    stepId: fixed-seconds
    task: unknown-task
  - description: Using minutes notation
    duration:
      seconds: 2m
      type: fixed
    name: Fixed Duration (Minutes)
    startTrigger:
      stepId: fixed-seconds
      type: afterStep
    stepId: fixed-minutes
    task: unknown-task
  - description: Using hours notation
    duration:
      seconds: 1h
      type: fixed
    name: Fixed Duration (Hours)
    startTrigger:
      stepId: fixed-minutes
      type: afterStep
    stepId: fixed-hours
    task: unknown-task
  - description: Using complex time notation
    duration:
      seconds: 1h30m15s
      type: fixed
    name: Fixed Duration (Complex)
    startTrigger:
      stepId: fixed-hours
      type: afterStep
    stepId: fixed-complex
    task: unknown-task
  trackId: fixed-duration-track
- name: Variable Duration Examples
  steps:
  - description: Using simple time notation
    duration:
      defaultSeconds: 3m
      maxSeconds: 5m
      minSeconds: 1m
      optimalSeconds: 2m30s
      triggerName: complete-variable-simple
      type: variable
    name: Variable Duration (Simple)
    startTrigger:
      offsetSeconds: 5m
      type: programStartOffset
    stepId: variable-simple
    task: unknown-task
  - description: Using complex time notation
    duration:
      defaultSeconds: 1h
      maxSeconds: 1h30m
      minSeconds: 45m
      optimalSeconds: 50m
      triggerName: complete-variable-complex
      type: variable
    name: Variable Duration (Complex)
    startTrigger:
      bufferSeconds: 30s
      stepId: variable-simple
      type: afterStepWithBuffer
    stepId: variable-complex
    task: complex-task
  trackId: variable-duration-track
